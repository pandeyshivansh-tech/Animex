<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Animex</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

  <header>
    <h1>Animex</h1>
    <button id="theme-toggle">Light Mode</button>
  </header>

  <div class="controls">
    <input type="text" id="search" placeholder="Search anime..." />

    <select id="filter">
      <option value="all">All</option>
      <option value="TV">TV</option>
      <option value="Movie">Movie</option>
    </select>

    <select id="sort">
      <option value="default">Sort</option>
      <option value="high">Rating High → Low</option>
      <option value="low">Rating Low → High</option>
    </select>
  </div>

  <div id="loader">Loading...</div>

  <div id="anime-container"></div>

  <footer>
  <p>© 2026 Animex — By Shivansh Pandey. All Rights Reserved.</p>
  <div class="socials">
    <a href="https://github.com/pandeyshivansh-tech" target="_blank"><i class="fab fa-github"></i></a>
    <a href="https://www.linkedin.com/in/shivansh-pandey-87bab5373" target="_blank"><i class="fab fa-linkedin"></i></a>
    <a href="https://x.com/itshivanshere" target="_blank"><i class="fa-brands fa-x-twitter"></i></a>
    <a href="https://www.instagram.com/itshivanshere?igsh=b3FsZWh3ZnlydDd5" target="_blank"><i class="fab fa-instagram"></i></a>
  </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
